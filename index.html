<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine - Classificador</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Estilos personalizados -->
    <style>
        body {
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        #webcam-container canvas {
            border-radius: 15px;
            border: 4px solid #0d6efd;
        }

        .btn-camera {
            font-size: 1.2rem;
            padding: 12px 25px;
            border-radius: 50px;
            transition: 0.3s;
        }

        .btn-camera:hover {
            transform: scale(1.05);
        }

        .progress {
            height: 25px;
            border-radius: 15px;
        }

        .label-text {
            font-weight: bold;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card p-4 text-center bg-dark text-white">
        <h2 class="mb-3">📷 Classificador com Teachable Machine</h2>

        <button class="btn btn-primary btn-camera mb-4" onclick="init()">
            Ativar Câmera
        </button>

        <div id="webcam-container" class="mb-4"></div>

        <div id="label-container" class="text-start"></div>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script>
    const URL = "./my_model/";

    let model, webcam, labelContainer, maxPredictions;

    async function init() {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const flip = true;
        webcam = new tmImage.Webcam(300, 300, flip);
        await webcam.setup();
        await webcam.play();
        window.requestAnimationFrame(loop);

        document.getElementById("webcam-container").innerHTML = "";
        document.getElementById("webcam-container").appendChild(webcam.canvas);

        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = "";

        for (let i = 0; i < maxPredictions; i++) {
            const wrapper = document.createElement("div");
            wrapper.classList.add("mb-3");

            const label = document.createElement("div");
            label.classList.add("label-text");

            const progress = document.createElement("div");
            progress.classList.add("progress");

            const progressBar = document.createElement("div");
            progressBar.classList.add("progress-bar", "progress-bar-striped", "progress-bar-animated");
            progressBar.style.width = "0%";

            progress.appendChild(progressBar);
            wrapper.appendChild(label);
            wrapper.appendChild(progress);

            labelContainer.appendChild(wrapper);
        }
    }

    async function loop() {
        webcam.update();
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);

        for (let i = 0; i < maxPredictions; i++) {
            const prob = prediction[i].probability;
            const percent = (prob * 100).toFixed(1) + "%";

            const wrapper = labelContainer.childNodes[i];
            const label = wrapper.childNodes[0];
            const progressBar = wrapper.childNodes[1].childNodes[0];

            label.innerHTML = prediction[i].className + " (" + percent + ")";
            progressBar.style.width = percent;
            progressBar.innerHTML = percent;
        }
    }
</script>

</body>
</html>
